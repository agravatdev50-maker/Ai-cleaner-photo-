name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-debug.apk SmartPhotoCleaner.apk

      - name: Delete old release (if exists)
        run: gh release delete latest-build --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        run: |
          gh release create latest-build SmartPhotoCleaner.apk \
            --title "Smart Photo Cleaner — Latest Build" \
            --notes "Automatically built from the latest commit. Download SmartPhotoCleaner.apk below." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
